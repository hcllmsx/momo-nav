name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5


      - name: Package Standard Version (Clean)
        run: |
          # 制作标准版：直接打包并排除 Vercel 特有文件和目录
          zip -r "momo-nav-${{ github.ref_name }}.zip" . -x "vercel.json" "scripts/*" ".git/*" ".github/*" ".gitignore" "*.zip"

      - name: Package Vercel Version (With Scripts)
        run: |
          # 制作 Vercel 专用版：包含 vercel.json 和 scripts 文件夹
          zip -r "momo-nav-vercel-${{ github.ref_name }}.zip" . -x ".git/*" ".github/*" ".gitignore" "*.zip"

      - name: Create GitHub Release
        uses: step-security/action-gh-release@v2
        with:
          files: |
            momo-nav-${{ github.ref_name }}.zip
            momo-nav-vercel-${{ github.ref_name }}.zip
          body: |
            ## 🚀 版本说明 / Release Notes
            
            此版本提供了两种预打包方案，请根据您的部署需求选择：
            
            ### 1. **momo-nav-${{ github.ref_name }}.zip (标准版 / Standard)**
            - 一般用这个就足够了。
            
            ### 2. **momo-nav-vercel-${{ github.ref_name }}.zip (Vercel 版)**
            - 如果你想要整活儿用于测试，需要使用 Vercel 的 Blob 存储等功能，就用这个版本。
            - 这是一个费力不讨好的版本，不推荐使用。
            
            ---
            *由 GitHub Actions 自动构建，确保构建环境一致性。*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
